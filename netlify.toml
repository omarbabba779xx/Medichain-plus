[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' data: https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' https://rpc-amoy.polygon.technology https://amoy.polygonscan.com wss:; worker-src 'self'; frame-ancestors 'none'"

[[redirects]]
  from = "/demo"
  to   = "/app.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
  force = false
