Organizations:
  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/medichain.com/msp
    Policies:
      Readers: {Type: Signature, Rule: "OR('OrdererMSP.member')"}
      Writers: {Type: Signature, Rule: "OR('OrdererMSP.member')"}
      Admins:  {Type: Signature, Rule: "OR('OrdererMSP.admin')"}

  - &Hospital
    Name: HospitalMSP
    ID: HospitalMSP
    MSPDir: crypto-config/peerOrganizations/hospital.medichain.com/msp
    Policies:
      Readers: {Type: Signature, Rule: "OR('HospitalMSP.admin','HospitalMSP.peer','HospitalMSP.client')"}
      Writers: {Type: Signature, Rule: "OR('HospitalMSP.admin','HospitalMSP.client')"}
      Admins:  {Type: Signature, Rule: "OR('HospitalMSP.admin')"}
      Endorsement: {Type: Signature, Rule: "OR('HospitalMSP.peer')"}

  - &Pharmacy
    Name: PharmacyMSP
    ID: PharmacyMSP
    MSPDir: crypto-config/peerOrganizations/pharmacy.medichain.com/msp
    Policies:
      Readers: {Type: Signature, Rule: "OR('PharmacyMSP.admin','PharmacyMSP.peer','PharmacyMSP.client')"}
      Writers: {Type: Signature, Rule: "OR('PharmacyMSP.admin','PharmacyMSP.client')"}
      Admins:  {Type: Signature, Rule: "OR('PharmacyMSP.admin')"}
      Endorsement: {Type: Signature, Rule: "OR('PharmacyMSP.peer')"}

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers: {Type: ImplicitMeta, Rule: "ANY Readers"}
    Writers: {Type: ImplicitMeta, Rule: "ANY Writers"}
    Admins:  {Type: ImplicitMeta, Rule: "MAJORITY Admins"}
    LifecycleEndorsement: {Type: ImplicitMeta, Rule: "MAJORITY Endorsement"}
    Endorsement: {Type: ImplicitMeta, Rule: "MAJORITY Endorsement"}
  Capabilities: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.medichain.com:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.medichain.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/medichain.com/orderers/orderer.medichain.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/medichain.com/orderers/orderer.medichain.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers: {Type: ImplicitMeta, Rule: "ANY Readers"}
    Writers: {Type: ImplicitMeta, Rule: "ANY Writers"}
    Admins:  {Type: ImplicitMeta, Rule: "MAJORITY Admins"}
    BlockValidation: {Type: ImplicitMeta, Rule: "ANY Writers"}
  Capabilities: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers: {Type: ImplicitMeta, Rule: "ANY Readers"}
    Writers: {Type: ImplicitMeta, Rule: "ANY Writers"}
    Admins:  {Type: ImplicitMeta, Rule: "MAJORITY Admins"}
  Capabilities: *ChannelCapabilities

Profiles:
  MediChainGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Hospital
        - *Pharmacy
