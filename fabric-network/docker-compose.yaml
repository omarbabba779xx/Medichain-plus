version: '3.7'

networks:
  medichain:
    name: medichain_network

volumes:
  orderer.medichain.com:
  peer0.hospital.medichain.com:
  peer0.pharmacy.medichain.com:
  couchdb0:
  couchdb1:

services:

  # ──────────────────────────────────────────────
  # Certificate Authority — Hôpital
  # ──────────────────────────────────────────────
  ca.hospital.medichain.com:
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-hospital
      # WARNING: TLS disabled for local dev only. Set =true in staging/production with proper certs.
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/hospital.medichain.com/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - medichain

  # ──────────────────────────────────────────────
  # Certificate Authority — Pharmacie
  # ──────────────────────────────────────────────
  ca.pharmacy.medichain.com:
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-pharmacy
      # WARNING: TLS disabled for local dev only. Set =true in staging/production with proper certs.
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/pharmacy.medichain.com/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - medichain

  # ──────────────────────────────────────────────
  # Orderer (Raft)
  # ──────────────────────────────────────────────
  orderer.medichain.com:
    image: hyperledger/fabric-orderer:2.5.6
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED=true
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    ports:
      - "7050:7050"
      - "7053:7053"
    volumes:
      - ./crypto-config/ordererOrganizations/medichain.com/orderers/orderer.medichain.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/medichain.com/orderers/orderer.medichain.com/tls:/var/hyperledger/orderer/tls
      - orderer.medichain.com:/var/hyperledger/production/orderer
    networks:
      - medichain

  # ──────────────────────────────────────────────
  # CouchDB — Hôpital
  # ──────────────────────────────────────────────
  couchdb0:
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    ports:
      - "5984:5984"
    volumes:
      - couchdb0:/opt/couchdb/data
    networks:
      - medichain

  # ──────────────────────────────────────────────
  # Peer — Hôpital
  # ──────────────────────────────────────────────
  peer0.hospital.medichain.com:
    image: hyperledger/fabric-peer:2.5.6
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=medichain_network
      - CORE_PEER_ID=peer0.hospital.medichain.com
      - CORE_PEER_ADDRESS=peer0.hospital.medichain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hospital.medichain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_LOCALMSPID=HospitalMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/peer/msp
      # WARNING: TLS disabled for local dev only. Set =true + configure TLS certs in production.
      - CORE_PEER_TLS_ENABLED=false
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    ports:
      - "7051:7051"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/hospital.medichain.com/peers/peer0.hospital.medichain.com/msp:/etc/hyperledger/peer/msp
      - peer0.hospital.medichain.com:/var/hyperledger/production
    depends_on:
      - couchdb0
      - orderer.medichain.com
    networks:
      - medichain

  # ──────────────────────────────────────────────
  # CouchDB — Pharmacie
  # ──────────────────────────────────────────────
  couchdb1:
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    ports:
      - "5985:5984"
    volumes:
      - couchdb1:/opt/couchdb/data
    networks:
      - medichain

  # ──────────────────────────────────────────────
  # Peer — Pharmacie
  # ──────────────────────────────────────────────
  peer0.pharmacy.medichain.com:
    image: hyperledger/fabric-peer:2.5.6
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=medichain_network
      - CORE_PEER_ID=peer0.pharmacy.medichain.com
      - CORE_PEER_ADDRESS=peer0.pharmacy.medichain.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.pharmacy.medichain.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_LOCALMSPID=PharmacyMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/peer/msp
      # WARNING: TLS disabled for local dev only. Set =true + configure TLS certs in production.
      - CORE_PEER_TLS_ENABLED=false
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-adminpw}
    ports:
      - "9051:9051"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/pharmacy.medichain.com/peers/peer0.pharmacy.medichain.com/msp:/etc/hyperledger/peer/msp
      - peer0.pharmacy.medichain.com:/var/hyperledger/production
    depends_on:
      - couchdb1
      - orderer.medichain.com
    networks:
      - medichain
